# Conda environment for the CN-targeting analysis pipeline.
#   conda env create -f environment.yml && conda activate cnt-analysis
# Mirrors the 'james-ml' env the manuscript analyses were run in.
name: cnt-analysis
channels: [conda-forge]
dependencies:
  - python=3.12
  - pandas
  - numpy
  - scipy
  - scikit-learn
  - xgboost
  - statsmodels
  - matplotlib
  - pyarrow
  - pip
  - pip:
      - cellxgene-census==1.18.0   # Fig 6 only; optional
